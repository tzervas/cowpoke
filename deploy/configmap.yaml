apiVersion: v1
kind: ConfigMap
metadata:
  name: cowpoke-config
  namespace: default
data:
  # Time window for feature extraction in seconds
  window-size: "300"
  
  # Cosine similarity threshold (0.0 to 1.0)
  # Higher values mean stricter matching to historical patterns
  similarity-threshold: "0.85"
  
  # Interval between metric collections in seconds
  metrics-interval: "15"
  
  # Enable verbose logging
  verbose: "false"
